services:
  - type: web
    name: bkonnecthomes-api
    env: node
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        value: prod_secret_key_change_me_later
      - key: DATABASE_URL
        fromDatabase:
          name: bkonnecthomes-db
          property: connectionString

databases:
  - name: bkonnecthomes-db
    databaseName: bkonnect
    user: admin
