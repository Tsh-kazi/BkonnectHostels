services:
  - type: web
    name: bkonnect-hostels-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run prisma:seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
